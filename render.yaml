services:
  - type: web
    name: pelusas-tienda-animal
    env: node
    region: frankfurt
    plan: free
    buildCommand: "./render_build.sh"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
